<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title | default: site.title | default: site.github.repository_name }}{% if site.description %} — {{ site.description }}{% endif %}</title>
    <meta name="description" content="{{ site.description }}">
    <meta property="og:type" content="website">
    <meta property="og:title" content="{{ site.title }} — Your climbing wall, mapped by AI">
    <meta property="og:description" content="{{ site.description }}">
    <meta property="og:url" content="https://jk-hosting.github.io/BoulderLog-App/">
    <meta property="og:image" content="https://jk-hosting.github.io/BoulderLog-App/social-preview.png">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="icon" type="image/png" href="{{ '/icon.png' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
  </head>
  <body>
    <a id="skip-to-content" href="#content">Skip to the content.</a>

    <header class="page-header" role="banner">
      <h1 class="project-name">{{ page.title | default: site.title | default: site.github.repository_name }}</h1>
      <h2 class="project-tagline">{{ page.description | default: site.description | default: site.github.project_tagline }}</h2>
      <a href="https://play.google.com/store/apps/details?id=com.jkhosting.boulderlog" class="btn">Get it on Google Play</a>
    </header>

    <main id="content" class="main-content" role="main">
      {{ content }}
    </main>
  </body>
</html>
